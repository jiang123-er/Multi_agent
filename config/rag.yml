# 模型类型：openai 或 ollama
model_type: openai

# NVIDIA NIM 配置
chat_model_name: meta/llama3-70b-instruct
embedding_model_name: nvidia/nv-embedqa-e5-v5
# api_key: 从环境变量 NVIDIA_API_KEY 读取
base_url: https://integrate.api.nvidia.com/v1
temperature: 0.3

